<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina niet gevonden — Technisch Bouwadvies</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
        .error { text-align: center; max-width: 500px; }
        .error-code { font-size: 8rem; font-weight: 800; color: #b3944d; line-height: 1; letter-spacing: -0.04em; }
        .error-title { font-size: 1.5rem; font-weight: 700; margin: 1.5rem 0 1rem; }
        .error-text { color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 2.5rem; }
        .error-btn { display: inline-flex; padding: 1rem 2.5rem; background: #b3944d; color: #0f0f0f; text-decoration: none; font-weight: 600; font-size: 0.8125rem; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 50px; transition: all 0.3s ease; }
        .error-btn:hover { background: #fff; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="error">
        <div class="error-code">404</div>
        <h1 class="error-title">Pagina niet gevonden</h1>
        <p class="error-text">De pagina die u zoekt bestaat niet of is verplaatst. Geen zorgen — wij helpen u graag verder.</p>
        <a href="/" class="error-btn">Terug naar home</a>
    </div>
</body>
</html>
